apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vidtag.fullname" . }}-secret
  labels:
    {{- include "vidtag.labels" . | nindent 4 }}
type: Opaque
stringData:
  vidtag-claude-api-key: {{ required "secrets.claudeApiKey is required (set --set secrets.claudeApiKey=...)" .Values.secrets.claudeApiKey | quote }}
  {{- if .Values.secrets.youtubeApiKey }}
  youtube-api-key: {{ .Values.secrets.youtubeApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.raindropApiToken }}
  raindrop-api-token: {{ .Values.secrets.raindropApiToken | quote }}
  {{- end }}
