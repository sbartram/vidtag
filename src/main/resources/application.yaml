spring:
  application:
    name: vidtag
  ai:
    anthropic:
      api-key: ${VIDTAG_CLAUDE_API_KEY:}
      chat:
        model: claude-sonnet-4-7
#        model: claude-opus-4-7

# Actuator Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when-authorized
    metrics:
      enabled: true

logging:
  level:
    org.bartram: DEBUG

# External API Configuration
# youtube.api.key and raindrop.api.token are set via environment variables:
#   YOUTUBE_API_KEY    -> youtube.api.key   (activates YouTubeApiClientImpl)
#   RAINDROP_API_TOKEN -> raindrop.api.token (activates RaindropApiClientImpl)
# When not set, stub implementations are used automatically.

raindrop:
  # Redis Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 15m  # 15 minutes
      cache-null-values: false

# VidTag Application Configuration
vidtag:
  # Enable debug mode globally (overridden by ?debug=true param)
  debug-mode: ${DEBUG_MODE:false}

  # Error response configuration
  error:
    include-stack-trace: ${INCLUDE_STACK_TRACE:false}
    include-binding-errors: true
    max-stack-trace-length: 2000

  # Scheduler Configuration
  scheduler:
    enabled: true  # Enable/disable scheduled playlist processing
    fixed-delay: 1h  # Delay between job executions (Duration: 1h, 30m, etc.)
    initial-delay: 60s  # Initial delay before first execution (Duration)
    playlist-ids: ${VIDTAG_YT_PLAYLIST_IDS:}  # Comma-separated YouTube playlist IDs (e.g., PLxxx...,PLyyy... from https://www.youtube.com/playlist?list=PLxxx...)

  # Unsorted Bookmark Processor Configuration
  unsorted-processor:
    enabled: true  # Enable/disable unsorted bookmark processing
    fixed-delay: 1h  # Delay between processor executions (Duration)
    initial-delay: 60s  # Initial delay before first execution (Duration)

  # Tag Filtering Configuration
  tagging:
    # Comma-separated list of tags to block from AI suggestions (empty = disabled)
    blocked-tags: ${VIDTAG_TAGGING_BLOCKED_TAGS:youtube,golf-tips,golf-instruction,golf-swing,swing-analysis,online-coaching,pga-instruction

  # Raindrop.io Configuration
  raindrop:
    # Fallback collection when AI confidence is low
    fallback-collection: ${VIDTAG_RAINDROP_FALLBACK_COLLECTION:videos}
    # Cache TTL for playlist → collection mappings
    collection-cache-ttl: ${VIDTAG_RAINDROP_COLLECTION_CACHE_TTL:24h}
    # Cache TTL for user's collection list
    collections-list-cache-ttl: ${VIDTAG_RAINDROP_COLLECTIONS_LIST_CACHE_TTL:1h}

# Resilience4J Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      youtube:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
      raindrop:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
      claude:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5

  retry:
    instances:
      youtube:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
      raindrop:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
      claude:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
